<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garmin Fitness Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --orange: #D85A30;
      --amber: #BA7517;
      --pink: #D4537E;
      --blue: #378ADD;
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f1f0ec;
      --text: #1a1a18;
      --text2: #6b6b66;
      --border: rgba(0,0,0,0.1);
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --surface2: #2e2e2c;
        --text: #f0efe9;
        --text2: #9a9a94;
        --border: rgba(255,255,255,0.1);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; margin: 0 auto; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 .dot {
      width: 10px; height: 10px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .updated {
      font-size: 12px;
      color: var(--text2);
    }

    .refresh-btn {
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }

    .refresh-btn:hover { color: var(--text); background: var(--surface2); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .card-label {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-value {
      font-size: 24px;
      font-weight: 600;
      line-height: 1.1;
    }

    .card-value span { font-size: 14px; font-weight: 400; color: var(--text2); }

    .card-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }

    .section { margin-bottom: 1.5rem; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 12px;
      color: var(--text2);
    }

    .legend span { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    .chart-wrap { width: 100%; height: 200px; position: relative; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(29,158,117,0.12);
      color: var(--green);
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 4rem 0;
      color: var(--text2);
      font-size: 14px;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: rgba(216,90,48,0.08);
      border: 1px solid rgba(216,90,48,0.3);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--orange);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span class="dot"></span> Fitness Dashboard</h1>
      <div class="header-right">
        <span class="updated" id="last-updated"></span>
        <button class="refresh-btn" onclick="loadDashboard()">
          ↻ Refresh
        </button>
      </div>
    </div>
    <div id="content">
      <div class="loading"><div class="spinner"></div><span>Loading your data...</span></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "19vjqayIvLC-OxD7D5f9Vna1fbXj8aXCGqpW2Vxa8-1U";
    const DAILY_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Daily%20Stats`;
    const ACT_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Activities`;

    let stepsChart, calsChart;

    function fmt(n) { return Math.round(Number(n||0)).toLocaleString(); }

    function fmtDate(d) {
      if (!d) return "";
      const p = d.split("-");
      if (p.length < 3) return d;
      const m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return m[parseInt(p[1])-1] + " " + parseInt(p[2]);
    }

    function fmtType(t) {
      if (!t) return "";
      return t.replace(/_/g," ").replace(/\b\w/g, c => c.toUpperCase());
    }

    async function fetchCSV(url) {
      const res = await fetch(url);
      const text = await res.text();
      return Papa.parse(text, { header: true, skipEmptyLines: true }).data;
    }

    function makeChart(id, labels, data, color) {
      return new Chart(document.getElementById(id), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: color,
            borderRadius: 5,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => " " + ctx.parsed.y.toLocaleString() } }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 }, autoSkip: false, maxRotation: 45 }
            },
            y: {
              grid: { color: "rgba(128,128,128,0.1)" },
              ticks: {
                font: { size: 11 },
                callback: v => v >= 1000 ? (v/1000).toFixed(0) + "k" : v
              }
            }
          }
        }
      });
    }

    function render(daily, activities) {
      const totalSteps  = daily.reduce((s,r) => s + Number(r["Steps"]||0), 0);
      const totalCals   = daily.reduce((s,r) => s + Number(r["Total Calories"]||0), 0);
      const avgActive   = Math.round(daily.reduce((s,r) => s + Number(r["Active Minutes"]||0), 0) / (daily.length||1));
      const hrVals      = daily.map(r => Number(r["Resting HR"]||0)).filter(v => v > 0);
      const avgHR       = hrVals.length ? Math.round(hrVals.reduce((a,b) => a+b,0)/hrVals.length) : null;
      const actCals     = activities.reduce((s,r) => s + Number(r["Calories"]||0), 0);
      const labels      = daily.map(r => fmtDate(r["Date"]));
      const stepsData   = daily.map(r => Number(r["Steps"]||0));
      const calsData    = daily.map(r => Number(r["Total Calories"]||0));

      document.getElementById("last-updated").textContent =
        "Updated " + new Date().toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

      document.getElementById("content").innerHTML = `
        <div class="cards">
          <div class="card">
            <div class="card-label"><span class="card-dot" style="background:#1D9E75"></span>Steps</div>
            <div class="card-value">${fmt(totalSteps)}</div>
            <div class="card-sub">last ${daily.length} days</div>
          </div>
          <div class="card">
            <div class="card-label"><span class="card-dot" style="background:#D85A30"></span>Calories</div>
            <div class="card-value">${fmt(totalCals)}</div>
            <div class="card-sub">last ${daily.length} days</div>
          </div>
          <div class="card">
            <div class="card-label"><span class="card-dot" style="background:#BA7517"></span>Avg active</div>
            <div class="card-value">${avgActive}<span> min</span></div>
            <div class="card-sub">per day</div>
          </div>
          <div class="card">
            <div class="card-label"><span class="card-dot" style="background:#D4537E"></span>Resting HR</div>
            <div class="card-value">${avgHR ? avgHR : "—"}${avgHR ? '<span> bpm</span>' : ''}</div>
            <div class="card-sub">avg resting</div>
          </div>
          <div class="card">
            <div class="card-label"><span class="card-dot" style="background:#378ADD"></span>Activity cals</div>
            <div class="card-value">${fmt(actCals)}</div>
            <div class="card-sub">${activities.length} activities</div>
          </div>
        </div>

        <div class="section">
          <div class="section-header"><span class="section-title">Daily steps</span></div>
          <div class="chart-card">
            <div class="legend"><span><span class="legend-dot" style="background:#1D9E75"></span>Steps per day</span></div>
            <div class="chart-wrap"><canvas id="stepsChart" role="img" aria-label="Daily step counts bar chart">Steps over last ${daily.length} days.</canvas></div>
          </div>
        </div>

        <div class="section">
          <div class="section-header"><span class="section-title">Daily calories burned</span></div>
          <div class="chart-card">
            <div class="legend"><span><span class="legend-dot" style="background:#D85A30"></span>Total calories</span></div>
            <div class="chart-wrap"><canvas id="calsChart" role="img" aria-label="Daily calories burned bar chart">Calories over last ${daily.length} days.</canvas></div>
          </div>
        </div>

        <div class="section">
          <div class="section-header"><span class="section-title">Activities</span></div>
          <div class="chart-card">
            ${activities.length === 0
              ? '<p style="color:var(--text2);font-size:13px;">No activities found.</p>'
              : `<table>
                  <thead><tr>
                    <th>Date</th><th>Activity</th><th>Type</th><th>Distance</th><th>Duration</th><th>Calories</th><th>Avg HR</th>
                  </tr></thead>
                  <tbody>
                    ${activities.slice().reverse().map(a => `<tr>
                      <td style="color:var(--text2)">${fmtDate(a["Date"])}</td>
                      <td style="font-weight:600">${a["Activity Name"]||"—"}</td>
                      <td><span class="badge">${fmtType(a["Type"])}</span></td>
                      <td>${Number(a["Distance (km)"]||0).toFixed(1)} km</td>
                      <td>${Math.round(Number(a["Duration (min)"]||0))} min</td>
                      <td>${fmt(a["Calories"])}</td>
                      <td>${a["Avg HR"]||"—"}</td>
                    </tr>`).join("")}
                  </tbody>
                </table>`
            }
          </div>
        </div>
      `;

      if (stepsChart) stepsChart.destroy();
      if (calsChart) calsChart.destroy();
      stepsChart = makeChart("stepsChart", labels, stepsData, "#1D9E75");
      calsChart  = makeChart("calsChart",  labels, calsData,  "#D85A30");
    }

    async function loadDashboard() {
      document.getElementById("content").innerHTML =
        '<div class="loading"><div class="spinner"></div><span>Loading your data...</span></div>';
      try {
        const [daily, activities] = await Promise.all([fetchCSV(DAILY_URL), fetchCSV(ACT_URL)]);
        render(daily, activities);
      } catch(e) {
        document.getElementById("content").innerHTML =
          `<div class="error">Could not load data. Make sure the Google Sheet is shared publicly as Viewer.<br><small style="opacity:0.7">${e.message}</small></div>`;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
