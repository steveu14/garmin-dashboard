name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 13,17,0 * * *'
  workflow_dispatch:        # Allows manual trigger from GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install garminconnect gspread google-auth

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run Garmin sync
        env:
          GARMIN_PASSWORD: ${{ secrets.GARMINPW }}
        run: python garmin_sync.py
